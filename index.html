<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Yes Kanban</title>
    <!-- Theme class before paint — branch logic must match resolveDocumentThemeClass in src/ui/lib/theme.ts -->
    <script>
      (function () {
        try {
          var key = "yes-kanban-theme";
          var raw = localStorage.getItem(key);
          var resolved =
            raw === "light" || raw === "dark"
              ? raw
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(resolved);
        } catch (_) {
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
